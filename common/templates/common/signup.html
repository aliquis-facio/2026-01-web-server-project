{% extends "base.html" %}

{% block title %}회원가입 | ASCII Motion Board{% endblock %}

{% block content %}
<section class="auth-panel">
  <h1>회원가입</h1>
  <form method="post" class="form-stack">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <label>
        {{ field.label }}
        {{ field }}
        {{ field.errors }}
      </label>
    {% endfor %}
    <button class="button" type="submit">가입하기</button>
  </form>
</section>
{% endblock %}
